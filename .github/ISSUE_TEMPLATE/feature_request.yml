name: Feature request
description: Suggest a new capability or a change in behavior.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation where the plugin doesn't quite fit today. Lead with the task, not the feature.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like the plugin to do? Be as concrete as you can — a sample invocation, expected output, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've tried or ruled out, and why they didn't fit.
