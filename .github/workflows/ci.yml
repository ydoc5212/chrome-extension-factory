name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Type check
        run: npm run compile

      - name: Build
        run: npm run build

      - name: CWS structural check
        run: npx tsx scripts/validate-cws.ts

      - name: Firefox build
        run: npm run build:firefox
